<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/dist/skinview3d.bundle.js"></script>
    <style>
        body { background: transparent; overflow: hidden; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #skin-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="skin-container"></div>
    <script>
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'loadSkin') {
                try {
                    const viewer = new skinview3d.SkinViewer({
                        width: 300,
                        height: 450,
                        container: document.getElementById('skin-container')
                    });
                    viewer.loadSkin(data.dataUri);
                    viewer.autoRotate = true;
                    viewer.autoRotateSpeed = 1.0;
                    viewer.controls.enableZoom = false;
                    viewer.renderer.setClearColor(0, 0); 
                } catch (e) {
                    console.error(e);
                }
            }
        });
    </script>
</body>
</html>
